#app{display:flex;flex-direction:column;height:100vh;min-height:0}

.side-item{display:flex;align-items:center;gap:9px;padding:11px 18px;font-size:13.5px;cursor:pointer;transition:background .1s}
.side-item:hover{background:rgba(255,255,255,.05)}
.row-hover:hover{background:#fbf7f0!important}
.more-link{font-size:12px;color:#9a948c;font-weight:500;cursor:pointer;transition:color .15s}

.card-title{font-size:15px;font-weight:700;color:#231f1c}

tbody tr.selected-blue{background:#eef1f7}

.upload-zone:hover{border-color:#F39200;background:#fffaf2;color:#c9760a}

.clabus-badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:4px}

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function decorateCompliance(r) {
  const sm = statusMeta(r.status);
  const tm = typeMeta(r.type);
  const dd = dday(r.effectiveDate);
  const ddShow = r.revised && typeof dd === 'number' && dd >= 0;
  const ddColor = dd != null && dd <= 14 ? '#D64545' : dd != null && dd <= 45 ? '#E08600' : '#7a8aa8';
  return { ...r,
    ddayNum: dd,
    statusColor: sm.color, statusBg: sm.bg,
    typeColor: tm.color, typeBg: tm.bg,
    appliesMark: r.applies ? '●' : '○', appliesColor: r.applies ? '#2E9E5B' : '#c3bdb5',
    revMark: r.revised ? '<span style="font-size:10px;font-weight:700;color:#F39200;background:#fdf3e3;border:1px solid #f3c87a;padding:1px 5px;border-radius:3px">개정</span>' : '<span style="color:#c3bdb5">–</span>',
    effShort: r.effectiveDate ? (ddShow ? ('D-'+dd) : r.effectiveDate.slice(5)) : '상시',
    ddayColor: ddShow ? ddColor : '#a7a199',
    ddayWeight: ddShow ? '700' : '400',
    ddayText: ddShow ? ('D-'+dd) : '',
    ddayShow
  };
}

function decorateEdu(e) {
  const dd = dday(e.next);
  let sc;
  if (e.status === '완료') sc = { color:'#2E9E5B', bg:'#e7f4ec' };
  else if (e.status === '지연') sc = { color:'#D64545', bg:'#fbe7e7' };
  else sc = { color:'#E08600', bg:'#fdf0db' };
  const km = e.kind === '신규' ? { color:'#1f3864', bg:'#e7ecf5' } : { color:'#7d756c', bg:'#f0eee9' };
  let ddText, ddColor;
  if (e.status === '완료') { ddText = '완료'; ddColor = '#2E9E5B'; }
  else if (dd < 0) { ddText = 'D+'+(-dd); ddColor = '#D64545'; }
  else { ddText = 'D-'+dd; ddColor = dd <= 14 ? '#D64545' : dd <= 30 ? '#E08600' : '#7d756c'; }
  return { ...e, dd, statusColor: sc.color, statusBg: sc.bg, kindColor: km.color, kindBg: km.bg, ddayText, ddayColor };
}

function clabusStatusMeta(s) {
  if (s === '결재완료') return { color:'#2E9E5B', bg:'#e7f4ec', icon:'✓' };
  if (s === '결재중') return { color:'#E08600', bg:'#fdf0db', icon:'⟳' };
  if (s === '작성중') return { color:'#7d756c', bg:'#f0eee9', icon:'✎' };
  return { color:'#a7a199', bg:'#f3f1ee', icon:'○' };
}

  const okN = allRows.filter(r => r.status === '준수').length;
  const progN = allRows.filter(r => r.status === '진행중').length;
  const lackN = allRows.filter(r => r.status === '미흡').length;
  const rate = Math.round((okN / total) * 100);
  const rateRing = `conic-gradient(#F39200 ${rate}%, #46598a 0)`;

            <div style="font-size:11px;font-weight:700;color:#c9760a;background:#fdedd6;padding:6px 10px;border-bottom:1px solid #f3d9b3">개정 후</div>
            <div style="font-size:12.5px;line-height:1.6;color:#3b3530;padding:10px 11px;font-weight:500">${esc(r.revisionAfter||'')}</div>
          </div>
        </div>` : `<div style="font-size:13px;color:#a7a199;background:#f8f6f3;border:1px dashed #e3e1de;border-radius:6px;padding:11px 13px">최근 개정 이력 없음</div>`}
      </div>

      <div style="margin-bottom:18px">

        <textarea id="law-detail-memo" data-law-id="${r.id}" style="width:100%;min-height:84px;resize:vertical;border:1px solid #e3e1de;border-radius:6px;padding:10px 12px;font-size:13px;line-height:1.6;font-family:inherit;color:#3b3530;outline:none">${esc(draft)}</textarea>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
          <span style="font-size:11.5px;color:#a7a199">담당자 · ${esc(r.owner)} / 최종갱신 ${esc(r.updated)}</span>
          <button data-save-memo="${r.id}" style="font-size:12.5px;font-weight:700;color:#fff;background:#F39200;border:none;border-radius:5px;padding:7px 16px;cursor:pointer">저장</button>
        </div>
      </div>

      <div>
        <div style="font-size:11px;font-weight:700;color:#a7a199;letter-spacing:.04em;margin-bottom:10px">대응 이력</div>

        <div style="display:flex;gap:11px;padding-bottom:14px">
          <div style="flex:none;display:flex;flex-direction:column;align-items:center">
            <span style="width:9px;height:9px;border-radius:50%;background:${i===0?'#F39200':'#c3bdb5'};margin-top:4px"></span>
            ${i < (r.history.length-1) ? '<span style="width:1px;flex:1;background:#ece9e5;margin-top:3px"></span>' : ''}

          <div style="flex:1;min-width:0;padding-bottom:2px">
            <div style="font-size:11.5px;color:#a7a199;font-weight:500;margin-bottom:2px">${h.date}</div>
            <div style="font-size:13px;line-height:1.5;color:#3b3530">${esc(h.text)}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

// ─── RENDER: SCREEN ③ COMPLIANCE ─────────────────────────────────────────────

function renderComp() {
  const allRows = state.compliance.map(decorateCompliance);
  const total = allRows.length;
  const laws = [...new Set(state.compliance.map(r => r.lawShort))];

  let filtered = [...allRows];
  if (state.treeFilter !== 'all') filtered = filtered.filter(r => r.lawShort === state.treeFilter);
  if (state.statusFilter !== 'all') filtered = filtered.filter(r => r.status === state.statusFilter);
  if (state.q.trim()) { const q = state.q.trim(); filtered = filtered.filter(r => (r.lawShort+r.article+r.articleName+r.requirement).includes(q)); }

  const selectedRec = allRows.find(r => r.id === state.selectedId) || null;
  const tableTitle = state.treeFilter === 'all' ? '전체 법규 준수현황' : state.treeFilter;

  const variantInfo = { '3a':'트리 + 표 + 우측 드로어', '3b':'필터 + 고정 분할 상세', '3c':'트리 + 표 인라인 확장' };
  const statusChipsHtml = [['all','전체'],['준수','준수'],['진행중','진행중'],['미흡','미흡']].map(([v,label]) => {
    const on = state.statusFilter === v;
    return `<button data-status-chip="${v}" class="chip-btn ${on?'active':''}">${label}</button>`;
  }).join('');

  function renderTree(withToggle) {
    const treeAllActive = state.treeFilter === 'all';
    let html = `<div data-tree-filter="all" style="padding:10px 16px;font-size:13px;cursor:pointer;border-bottom:1px solid #f3f0ec;font-weight:${treeAllActive?'700':'500'};color:${treeAllActive?'#1f3864':'#3b3530'};background:${treeAllActive?'#eef1f7':'transparent'}">전체 법규 <span style="float:right;color:#a7a199">${total}</span></div>`;
    laws.forEach(law => {
      const items = allRows.filter(r => r.lawShort === law);
      const active = state.treeFilter === law;
      const open = !!state.treeOpen[law];
      html += `<div>
        <div ${withToggle?`data-tree-toggle="${law}"`:`data-tree-filter="${law}"`} style="display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:13px;cursor:pointer;font-weight:${active?'700':'500'};color:${active?'#1f3864':'#3b3530'};background:${active?'#eef1f7':'transparent'}">
          ${withToggle?`<span style="font-size:10px;color:#a7a199;transform:${open?'rotate(90deg)':'none'};display:inline-block;transition:transform .15s">▶</span>`:''}
          <span style="flex:1" ${withToggle?`data-tree-filter="${law}"`:''} >${esc(law)}</span>
          <span style="font-size:11px;color:#a7a199">${items.length}</span>
        </div>
        ${withToggle && open ? items.map(it => `
        <div data-row-click="${it.id}" class="row-hover" style="display:flex;align-items:center;gap:8px;padding:8px 16px 8px 30px;font-size:12px;color:#6b635b;cursor:pointer">
          <span style="width:6px;height:6px;border-radius:50%;background:${it.statusColor};flex:none"></span>
          <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(it.article)} ${esc(it.articleName)}</span>
        </div>`).join('') : ''}
      </div>`;
    });
    return html;
  }

  function renderTableRows3a() {
    return filtered.map(r => `
    <tr data-row-click="${r.id}" class="${r.id === state.selectedId ? 'selected' : ''}">
      <td style="font-weight:700;color:#2a2522">${esc(r.lawShort)}</td>
      <td style="text-align:center"><span style="font-size:11px;font-weight:700;color:${r.typeColor};background:${r.typeBg};padding:2px 7px;border-radius:3px">${r.type}</span></td>
      <td style="color:#3b3530">${esc(r.article)} ${esc(r.articleName)}</td>
      <td style="text-align:center;color:${r.appliesColor};font-size:14px">${r.appliesMark}</td>
      <td style="text-align:center"><span class="badge" style="color:${r.statusColor};background:${r.statusBg}">${r.status}</span></td>
      <td style="text-align:center">${r.revMark}</td>
      <td style="text-align:center;font-size:11.5px;color:${r.ddayColor};font-weight:${r.ddayWeight}">${r.effShort}</td>
      <td style="color:#5c554e">${esc(r.owner)}</td>
    </tr>`).join('');
  }

  if (state.variant === '3a') {
    return `<div class="content-pad">
      ${renderVariantSwitcher(variantInfo)}
      <div style="display:grid;grid-template-columns:230px 1fr;gap:14px;position:relative">
        <div class="card" style="align-self:start">
          <div style="padding:12px 16px;border-bottom:1px solid #ece9e5;font-size:13.5px;font-weight:700;color:#231f1c">법규 분류</div>
          ${renderTree(true)}
        </div>
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-bottom:1px solid #ece9e5;flex-wrap:wrap">
            <span style="font-size:15px;font-weight:700;color:#231f1c">${esc(tableTitle)} <span style="font-size:12px;color:#a7a199;font-weight:500">${filtered.length}건</span></span>
            <div style="display:flex;gap:6px">${statusChipsHtml}</div>
          </div>
          <div style="overflow-x:auto">
            <table style="min-width:880px">
              <thead><tr>
                <th style="text-align:left">법령명</th>
                <th style="text-align:center">구분</th>
                <th style="text-align:left">조항</th>
                <th style="text-align:center">해당</th>
                <th style="text-align:center">준수상태</th>
                <th style="text-align:center">개정</th>
                <th style="text-align:center">시행일</th>
                <th style="text-align:left">담당자</th>
              </tr></thead>
              <tbody>${renderTableRows3a()}</tbody>
            </table>
          </div>
        </div>
        ${selectedRec ? `
        <div style="position:absolute;top:0;right:0;bottom:0;width:440px;box-shadow:-8px 0 24px rgba(0,0,0,.12);border-radius:8px;overflow:hidden;background:#fff;z-index:10">
          ${renderLawDetail(selectedRec, 'drawer')}
        </div>` : ''}
      </div>
    </div>`;
  }

  if (state.variant === '3b') {
    const lawChipDefs = [['all','전체'], ...laws.map(l => [l, l.replace('처벌법','법').replace('안전관리법','관리법').replace('산업안전보건법','산안법')])];
    const lawChipsHtml = lawChipDefs.map(([v,label]) => {
      const on = state.treeFilter === v;
      return `<button data-law-chip="${v}" class="chip-btn ${on?'active-orange':''}">${label}</button>`;
    }).join('');

    return `<div class="content-pad">
      ${renderVariantSwitcher(variantInfo)}
      <div style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e0ddd8;border-radius:8px;padding:12px 16px;margin-bottom:14px;flex-wrap:wrap">
        <input id="law-search" value="${esc(state.q)}" placeholder="법령·조항 검색" style="flex:1;min-width:180px;border:1px solid #e0ddd8;border-radius:6px;padding:8px 12px;font-size:13px;outline:none"/>
        <div style="display:flex;gap:6px">${statusChipsHtml}</div>
        <div style="display:flex;gap:6px">${lawChipsHtml}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 420px;gap:14px;align-items:start">
        <div class="card">
          <div style="padding:12px 16px;border-bottom:1px solid #ece9e5;font-size:15px;font-weight:700;color:#231f1c">${esc(tableTitle)} <span style="font-size:12px;color:#a7a199;font-weight:500">${filtered.length}건</span></div>
          <div style="overflow-x:auto">
            <table style="min-width:520px">
              <thead><tr>
                <th style="text-align:left">법령 · 조항</th>
                <th style="text-align:center">준수상태</th>
                <th style="text-align:center">시행일</th>
                <th style="text-align:left">담당</th>
              </tr></thead>
              <tbody>
                ${filtered.map(r => `
                <tr data-row-click="${r.id}" class="${r.id === state.selectedId ? 'selected-blue' : ''}">
                  <td>
                    <div style="font-weight:700;color:#2a2522">${esc(r.lawShort)} <span style="color:#a7a199;font-weight:500">· ${esc(r.article)}</span></div>
                    <div style="font-size:11.5px;color:#9a948c;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px">${esc(r.articleName)}</div>
                  </td>
                  <td style="text-align:center"><span class="badge" style="color:${r.statusColor};background:${r.statusBg}">${r.status}</span></td>
                  <td style="text-align:center;font-size:11.5px;color:${r.ddayColor};font-weight:${r.ddayWeight}">${r.effShort}</td>
                  <td style="color:#5c554e">${esc(r.owner)}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
        <div class="detail-panel" style="min-height:480px;display:flex;flex-direction:column">
          ${selectedRec ? renderLawDetail(selectedRec, 'dock') : `<div class="detail-empty" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <div class="detail-empty-icon">⚖️</div>
            <div class="detail-empty-text">법규 행을 선택하면 조항 상세·근거·<br>개정 비교·대응현황이 표시됩니다.</div>
          </div>`}
        </div>
      </div>
    </div>`;
  }

  // 3c: inline expand
  return `<div class="content-pad">
    ${renderVariantSwitcher(variantInfo)}
    <div style="display:grid;grid-template-columns:230px 1fr;gap:14px">
      <div class="card" style="align-self:start">
        <div style="padding:12px 16px;border-bottom:1px solid #ece9e5;font-size:13.5px;font-weight:700;color:#231f1c">법규 분류</div>
        ${renderTree(false)}
      </div>
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-bottom:1px solid #ece9e5;flex-wrap:wrap">
          <span style="font-size:15px;font-weight:700;color:#231f1c">${esc(tableTitle)} <span style="font-size:12px;color:#a7a199;font-weight:500">${filtered.length}건</span></span>
          <div style="display:flex;gap:6px">${statusChipsHtml}</div>
        </div>
        <table>
          <thead><tr>
            <th style="text-align:left">법령명</th>
            <th style="text-align:left">조항</th>
            <th style="text-align:center">준수상태</th>
            <th style="text-align:center">개정</th>
            <th style="text-align:center">시행일</th>
            <th style="text-align:center"></th>
          </tr></thead>
          <tbody>
            ${filtered.map(r => {
              const expanded = r.id === state.selectedId;
              return `<tr data-row-click="${r.id}" class="${expanded ? 'selected' : ''}">
                <td style="font-weight:700;color:#2a2522">${esc(r.lawShort)} <span style="font-size:10px;font-weight:700;color:${r.typeColor};background:${r.typeBg};padding:1px 6px;border-radius:3px;margin-left:4px">${r.type}</span></td>
                <td style="color:#3b3530">${esc(r.article)} <span style="color:#a7a199">${esc(r.articleName)}</span></td>
                <td style="text-align:center"><span class="badge" style="color:${r.statusColor};background:${r.statusBg}">${r.status}</span></td>
                <td style="text-align:center">${r.revMark}</td>
                <td style="text-align:center;font-size:11.5px;color:${r.ddayColor};font-weight:${r.ddayWeight}">${r.effShort}</td>
                <td style="text-align:center;color:#a7a199;font-size:11px">${expanded ? '▲ 닫기' : '▼ 상세'}</td>
              </tr>
              ${expanded ? `<tr><td colspan="6" style="padding:0;background:#faf8f5;border-bottom:2px solid #ece9e5">
                <div style="padding:4px 14px 14px">
                  ${renderLawDetail(r, 'inline')}
                </div>
              </td></tr>` : ''}`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function renderVariantSwitcher(variantInfo) {
  const btns = ['3a','3b','3c'].map(v => {
    const labels = { '3a':'우측 드로어', '3b':'분할 도크', '3c':'인라인 확장' };
    const on = v === state.variant;
    return `<button data-variant="${v}" class="variant-btn ${on?'active':'inactive'}"><span style="font-weight:900">${v}</span> ${labels[v]}</button>`;
  }).join('');
  return `<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap">
    <span style="font-size:11.5px;font-weight:700;color:#9a948c;letter-spacing:.04em">레이아웃 변형</span>
    <div style="display:flex;gap:6px;background:#fff;border:1px solid #d8d4ce;border-radius:8px;padding:4px">${btns}</div>
    <span style="font-size:12px;color:#a7a199">${variantInfo[state.variant]}</span>
  </div>`;
}

// ─── RENDER: SCREEN ④ REGISTER ───────────────────────────────────────────────

function renderRegister() {
  const legiFilterOptions = [['all','전체'],['검토전','검토전'],['검토중','검토중'],['완료','완료']];
  const filteredLegi = state.legiFilter === 'all' ? LEGI_SEED : LEGI_SEED.filter(l => l.status === state.legiFilter);
  const registerFilterOptions = [['all','전체'],['완료','완료'],['진행중','진행중'],['미흡','미흡']];
  const filteredRegister = state.registerFilter === 'all' ? state.register : state.register.filter(r => r.status === state.registerFilter);
  const selReg = state.register.find(r => r.id === state.selectedRegisterId);

  function legiStatusStyle(s) {
    if (s === '완료') return { color:'#2E9E5B', bg:'#e7f4ec' };
    if (s === '검토중') return { color:'#E08600', bg:'#fdf0db' };
    return { color:'#a7a199', bg:'#f3f1ee' };
  }

  return `<div class="content-pad">

    <!-- 법제처 입법예고 섹션 -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="card-title">📋 법제처 입법예고 현황</span>
          <span style="font-size:11px;color:#a7a199;font-weight:500">개정 예정 법규 모니터링</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="display:flex;gap:6px">
            ${legiFilterOptions.map(([v,label]) => {
              const on = state.legiFilter === v;
              return `<button data-legi-filter="${v}" class="chip-btn ${on?'active':''}">${label}</button>`;
            }).join('')}
          </div>
          <a href="https://www.moleg.go.kr/lawinfo/makingList.mo?mid=a10104010000" target="_blank" style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#1f3864;background:#eef1f7;border:1px solid #dbe2ef;border-radius:5px;padding:6px 11px">
            🔗 법제처 바로가기
          </a>
        </div>
      </div>
      <div>
        ${filteredLegi.map(l => {
          const ss = legiStatusStyle(l.status);
          const ddNum = l.dday;
          const isPast = ddNum < 0;
          return `<div class="legi-row">
            <div style="flex:none;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:52px">
              <span class="badge" style="color:${ss.color};background:${ss.bg}">${l.status}</span>
              ${!isPast ? `<span style="font-size:10px;font-weight:700;color:${ddNum<=5?'#D64545':ddNum<=14?'#E08600':'#7a8aa8'}">D-${ddNum}</span>` : `<span style="font-size:10px;color:#c3bdb5">마감</span>`}
            </div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13.5px;font-weight:700;color:#231f1c;margin-bottom:3px">${esc(l.law)}</div>
              <div style="font-size:12px;color:#9a948c;margin-bottom:5px">${l.ministry} · 예고 ${l.noticeDate} ~ ${l.closingDate} (${l.period})</div>
              <div style="font-size:12.5px;color:#5c554e;line-height:1.5">${esc(l.summary)}</div>
            </div>
            <div style="flex:none;display:flex;flex-direction:column;gap:6px;align-items:flex-end">
              <a href="${l.link}" target="_blank" style="font-size:11.5px;color:#1f3864;background:#eef1f7;border:1px solid #dbe2ef;border-radius:4px;padding:4px 9px;font-weight:500">원문 보기</a>
              <button data-legi-review="${l.id}" style="font-size:11.5px;color:#fff;background:${l.status==='완료'?'#7d756c':'#F39200'};border:none;border-radius:4px;padding:4px 9px;cursor:pointer;font-weight:600">
                ${l.status==='완료'?'검토 완료':'검토 등록'}
              </button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- 법령 검토등록 관리 -->
    <div style="display:grid;grid-template-columns:1fr ${selReg?'400px':'0px'};gap:${selReg?'14px':'0'};align-items:start;transition:grid-template-columns .2s">
      <div class="card">
        <div class="card-header">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span class="card-title">법령 검토등록 관리</span>
            <div style="display:flex;gap:6px">
              ${registerFilterOptions.map(([v,label]) => {
                const on = state.registerFilter === v;
                const sm = v==='완료'?{c:'#2E9E5B',b:'#e7f4ec'}:v==='진행중'?{c:'#E08600',b:'#fdf0db'}:v==='미흡'?{c:'#D64545',b:'#fbe7e7'}:null;
                return `<button data-reg-filter="${v}" style="font-size:11.5px;padding:5px 11px;border-radius:14px;cursor:pointer;font-weight:${on?'700':'500'};border:1px solid ${on?(sm?sm.c:'#1f3864'):'#e0ddd8'};background:${on?(sm?sm.b:'#eef1f7'):'#fff'};color:${on?(sm?sm.c:'#1f3864'):'#7d756c'}">${label}</button>`;

          </div>

            ＋ 검토 등록

        </div>
        <div style="overflow-x:auto">
          <table style="min-width:700px">

              <th style="text-align:left">담당자</th>
              <th style="text-align:center">결재상태 (클래버스)</th>
              <th style="text-align:center">첨부</th>
              <th style="text-align:center">상태</th>
            </tr></thead>
            <tbody>
              ${filteredRegister.map(r => {
                const sm = statusMeta(r.status === '완료' ? '준수' : r.status === '진행중' ? '진행중' : '미흡');
                const cm = clabusStatusMeta(r.clabusStatus);
                return `<tr data-reg-row="${r.id}" class="${r.id === state.selectedRegisterId ? 'selected' : ''}">
                  <td>
                    <div style="font-weight:700;color:#2a2522">${esc(r.lawShort)} ${esc(r.article)}</div>
                    <div style="font-size:11.5px;color:#9a948c;margin-top:2px">${esc(r.articleName)}</div>
                  </td>
                  <td style="color:#5c554e;white-space:nowrap">${r.reviewDate}</td>
                  <td style="color:#5c554e">${esc(r.reviewer)}</td>
                  <td style="text-align:center">
                    <span class="clabus-badge" style="color:${cm.color};background:${cm.bg}">
                      ${cm.icon} ${esc(r.clabusStatus)}
                    </span>
                    ${r.clabusRef ? `<div style="font-size:10.5px;color:#a7a199;margin-top:2px">${r.clabusRef}</div>` : ''}
                  </td>
                  <td style="text-align:center">
                    ${r.attachment ? `<span style="font-size:11.5px;color:#1f3864;background:#eef1f7;border:1px solid #dbe2ef;border-radius:3px;padding:2px 7px">📎 ${esc(r.attachment)}</span>` : '<span style="color:#c3bdb5;font-size:12px">없음</span>'}
                  </td>
                  <td style="text-align:center"><span class="badge" style="color:${sm.color};background:${sm.bg}">${r.status}</span></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      ${selReg ? renderRegDetail(selReg) : ''}
    </div>
  </div>`;
}

function renderRegDetail(r) {
  const sm = statusMeta(r.status === '완료' ? '준수' : r.status === '진행중' ? '진행중' : '미흡');
  const cm = clabusStatusMeta(r.clabusStatus);
  return `<div class="detail-panel">
    <div style="padding:16px 18px;border-bottom:1px solid #ece9e5;background:#fbfaf8;display:flex;align-items:flex-start;justify-content:space-between">
      <div>
        <div style="font-size:11px;color:#9a948c;font-weight:500;margin-bottom:4px">${esc(r.lawShort)}</div>
        <div style="font-size:16px;font-weight:900;color:#231f1c">${esc(r.article)} ${esc(r.articleName)}</div>
      </div>
      <button data-close-reg style="width:28px;height:28px;border:1px solid #e3e1de;background:#fff;border-radius:5px;cursor:pointer;font-size:14px;color:#8a847d">✕</button>
    </div>
    <div style="padding:16px 18px;display:flex;flex-direction:column;gap:14px">
      <div>
        <div style="font-size:11px;font-weight:700;color:#a7a199;margin-bottom:5px">검토 요약</div>
        <div style="font-size:13px;line-height:1.6;color:#4a443e;background:#f8f6f3;border:1px solid #efece8;border-radius:6px;padding:10px 12px">${esc(r.summary)}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div style="font-size:11px;font-weight:700;color:#a7a199;margin-bottom:4px">검토일</div>
          <div style="font-size:13.5px;color:#3b3530;font-weight:500">${r.reviewDate}</div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:700;color:#a7a199;margin-bottom:4px">담당자</div>
          <div style="font-size:13.5px;color:#3b3530;font-weight:500">${esc(r.reviewer)}</div>
        </div>
      </div>
      <div>
        <div style="font-size:11px;font-weight:700;color:#a7a199;margin-bottom:5px">상태</div>
        <span class="badge" style="color:${sm.color};background:${sm.bg}">${r.status}</span>
      </div>
      <div>
        <div style="font-size:11px;font-weight:700;color:#a7a199;margin-bottom:8px">클래버스 결재 연동</div>
        <div style="background:#f8f6f3;border:1px solid #efece8;border-radius:8px;padding:14px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <span style="font-size:13px;font-weight:700;color:#231f1c">결재 상태</span>
            <span class="clabus-badge" style="color:${cm.color};background:${cm.bg}">${cm.icon} ${esc(r.clabusStatus)}</span>
          </div>
          ${r.clabusRef ? `<div style="font-size:12px;color:#7d756c;margin-bottom:10px">결재 참조번호: <span style="font-weight:700;color:#1f3864">${r.clabusRef}</span></div>` : ''}
          <button style="width:100%;padding:9px;border-radius:6px;border:1.5px solid #1f3864;background:${r.clabusRef?'#fff':'#1f3864'};color:${r.clabusRef?'#1f3864':'#fff'};font-weight:700;font-size:13px;cursor:pointer">
            ${r.clabusRef ? '🔗 클래버스 결재 조회' : '📤 클래버스 결재 요청'}
          </button>
        </div>
      </div>
      ${r.attachment ? `<div>
        <div style="font-size:11px;font-weight:700;color:#a7a199;margin-bottom:5px">첨부파일</div>
        <a href="#" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#1f3864;background:#eef1f7;border:1px solid #dbe2ef;border-radius:5px;padding:7px 11px;font-weight:500">📎 ${esc(r.attachment)}</a>
      </div>` : `<div class="upload-zone" data-upload-for="${r.id}">
        <div style="font-size:24px;margin-bottom:8px">📂</div>
        <div style="font-size:13px;font-weight:600">첨부파일 업로드</div>
        <div style="font-size:12px;margin-top:4px">검토 문서·근거자료를 여기에 드래그하거나 클릭하세요</div>
      </div>`}
    </div>
  </div>`;
}

// ─── RENDER: MAIN ────────────────────────────────────────────────────────────

function renderContent() {
  let screenHtml = '';
  if (state.screen === 'main') screenHtml = renderMain();
  else if (state.screen === 'edu') screenHtml = renderEdu();
  else if (state.screen === 'comp') screenHtml = renderComp();
  else if (state.screen === 'register') screenHtml = renderRegister();
  return renderContentTopbar() + screenHtml;
}

function render() {
  document.getElementById('topnav').innerHTML = renderTopnav();
  document.getElementById('sidebar').innerHTML = renderSidebar();
  document.getElementById('content').innerHTML = renderContent();
  bindEvents();

  // restore textarea focus/value after re-render
  const ta = document.getElementById('law-detail-memo');
  if (ta) {
    ta.addEventListener('input', e => { currentDraftMemo = e.target.value; });
  }
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────

function bindEvents() {
  document.getElementById('site-select').addEventListener('change', e => setState({ site: e.target.value }));

  document.addEventListener('click', handleClick, { once: true });
  // use event delegation on content and sidebar
}

function handleClick(e) {
  const target = e.target.closest('[data-nav],[data-edu],[data-row-click],[data-goto-comp],[data-status-chip],[data-law-chip],[data-variant],[data-tree-filter],[data-tree-toggle],[data-toggle-applies],[data-set-status],[data-save-memo],[data-close-detail],[data-legi-filter],[data-reg-filter],[data-reg-row],[data-close-reg],[data-legi-review],[data-upload-new],[data-upload-for],[#mark-complete-btn]');
  // handled below
}

document.addEventListener('click', function(e) {
  const t = e.target;

  const nav = t.closest('[data-nav]');
  if (nav) { setState({ screen: nav.dataset.nav, selectedId: null, selectedEduId: null }); return; }

  const gotoComp = t.closest('[data-goto-comp]');
  if (gotoComp) { setState({ screen:'comp', selectedId: gotoComp.dataset.gotoComp }); return; }

  const eduRow = t.closest('[data-edu]');
  if (eduRow) { setState({ selectedEduId: eduRow.dataset.edu }); return; }

  const markComplete = t.closest('#mark-complete-btn');
  if (markComplete) {
    const id = markComplete.dataset.eduId;
    if (!id) return;
    const newEdu = state.edu.map(e => {
      if (e.id !== id || e.status === '완료') return e;
      const yrs = e.cycle === '분기' ? 0.25 : 2;
      const d = new Date('2026-06-30T00:00:00');
      d.setMonth(d.getMonth() + Math.round(yrs * 12));
      return { ...e, status:'완료', last:'2026-06-30', next: d.toISOString().slice(0,10) };
    });
    setState({ edu: newEdu });
    return;
  }

  const rowClick = t.closest('[data-row-click]');
  if (rowClick) {
    const id = rowClick.dataset.rowClick;
    const newId = state.selectedId === id ? null : id;
    if (newId) {
      const rec = state.compliance.find(r => r.id === newId);
      if (rec) currentDraftMemo = rec.response || '';
    }
    setState({ selectedId: newId });
    return;
  }

  const variant = t.closest('[data-variant]');
  if (variant) { setState({ variant: variant.dataset.variant, selectedId: null }); return; }

  const treeFilter = t.closest('[data-tree-filter]');
  if (treeFilter) { setState({ treeFilter: treeFilter.dataset.treeFilter, selectedId: null }); return; }

  const treeToggle = t.closest('[data-tree-toggle]');
  if (treeToggle && !t.closest('[data-tree-filter]')) {
    const law = treeToggle.dataset.treeToggle;
    const newOpen = { ...state.treeOpen, [law]: !state.treeOpen[law] };
    setState({ treeOpen: newOpen });
    return;
  }

  const statusChip = t.closest('[data-status-chip]');
  if (statusChip) { setState({ statusFilter: statusChip.dataset.statusChip }); return; }

  const lawChip = t.closest('[data-law-chip]');
  if (lawChip) { setState({ treeFilter: lawChip.dataset.lawChip }); return; }

  const toggleApplies = t.closest('[data-toggle-applies]');
  if (toggleApplies) {
    const id = toggleApplies.dataset.toggleApplies;
    const newCompliance = state.compliance.map(r => r.id === id ? { ...r, applies: !r.applies, updated:'2026-06-30' } : r);
    setState({ compliance: newCompliance });
    return;
  }

  const setStatus = t.closest('[data-set-status]');
  if (setStatus) {
    const id = setStatus.dataset.setStatus;
    const val = setStatus.dataset.statusVal;
    const newCompliance = state.compliance.map(r => r.id === id ? { ...r, status: val, updated:'2026-06-30' } : r);
    setState({ compliance: newCompliance });
    return;
  }

  const saveMemo = t.closest('[data-save-memo]');
  if (saveMemo) {
    const id = saveMemo.dataset.saveMemo;
    const ta = document.getElementById('law-detail-memo');
    const text = ta ? ta.value : currentDraftMemo;
    const newCompliance = state.compliance.map(r => r.id === id ? { ...r, response: text, updated:'2026-06-30' } : r);
    currentDraftMemo = text;
    setState({ compliance: newCompliance });
    return;
  }

  const closeDetail = t.closest('[data-close-detail]');
  if (closeDetail) { setState({ selectedId: null }); return; }

  const legiFilter = t.closest('[data-legi-filter]');
  if (legiFilter) { setState({ legiFilter: legiFilter.dataset.legiFilter }); return; }

  const regFilter = t.closest('[data-reg-filter]');
  if (regFilter) { setState({ registerFilter: regFilter.dataset.regFilter }); return; }

  const regRow = t.closest('[data-reg-row]');
  if (regRow) {
    const id = regRow.dataset.regRow;
    setState({ selectedRegisterId: state.selectedRegisterId === id ? null : id });
    return;
  }

  const closeReg = t.closest('[data-close-reg]');
  if (closeReg) { setState({ selectedRegisterId: null }); return; }

  const legiReview = t.closest('[data-legi-review]');
  if (legiReview) {
    // Simulate opening the review dialog — just highlight action
    alert('법제처 입법예고 검토 등록 화면으로 이동합니다.\n(실제 연동 시 법령 검토등록 화면과 연결됩니다)');
    return;
  }

  const uploadNew = t.closest('[data-upload-new]');
  if (uploadNew) {
    alert('검토 등록 다이얼로그가 열립니다.\n(실제 구현 시 모달로 법령·담당자·요약·첨부파일을 입력합니다)');
    return;
  }

  const uploadFor = t.closest('[data-upload-for]');
  if (uploadFor) {
    alert('파일 업로드 다이얼로그가 열립니다.\n(실제 구현 시 파일 선택 → 서버 업로드 → 클래버스 문서 연결)');
    return;
  }
});

// search input
document.addEventListener('input', function(e) {
  if (e.target.id === 'law-search') {
    setState({ q: e.target.value });
  }
  if (e.target.id === 'law-detail-memo') {
    currentDraftMemo = e.target.value;
  }
});

// ─── INIT ────────────────────────────────────────────────────────────────────

render();
</script>
</body>
</html>

name: 법제처 입법예고 동기화

on:
  schedule:
    - cron: '0 */6 * * *'   # 6시간마다 (UTC 기준)
  workflow_dispatch: {}      # 수동 실행 버튼

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install --no-save firebase-admin@12 fast-xml-parser@4

      - name: 입법예고 동기화 실행
        run: node scripts/sync-legi.mjs
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DATA_API_URL: ${{ vars.DATA_API_URL }}
